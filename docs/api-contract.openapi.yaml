              type: string
              format: date-time
            transcript:
              type: string
            analysis:
              type: object
              properties:
                completed_habits:
                  type: array
                  items:
                    type: string
                    format: uuid
                missed_habits:
                  type: array
                  items:
                    type: string
                    format: uuid
                blockers:
                  type: array
                  items:
                    type: string
                commitments:
                  type: array
                  items:
                    type: string
                recap_text:
                  type: string

    TwilioVoiceWebhookPayload:
      type: object
      properties:
        CallSid:
          type: string
