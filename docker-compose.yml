version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: goalcoach-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goalcoach
    ports:
      - "5432:5432"
    volumes:
      - goalcoach-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: goalcoach-redis
    ports:
      - "6379:6379"
    volumes:
      - goalcoach-redis-data:/data

volumes:
  goalcoach-postgres-data:
  goalcoach-redis-data:
